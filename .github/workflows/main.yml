name: AI Auto Fix

on:
  issues:
    types: [opened]

jobs:
  fix-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install openai

      - name: Run AI Fix Script
        run: python ai_fix.py

      - name: Commit changes
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "ai@bot.com"
          git add .
          git commit -m "🤖 AI Fix applied"
          git push
